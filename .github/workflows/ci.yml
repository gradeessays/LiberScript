name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Dummy values so env validation passes during typecheck/build in CI.
  DATABASE_URL: postgresql://liberscript:liberscript@localhost:5432/liberscript
  REDIS_URL: redis://localhost:6379
  AUTH_SECRET: ci-auth-secret-at-least-16-chars
  ENCRYPTION_KEY: Y2ktZW5jcnlwdGlvbi1rZXktMzJieXRlcy1wYWQtMDA=
  S3_ENDPOINT: http://localhost:9000
  S3_BUCKET: liberscript
  S3_ACCESS_KEY_ID: liberscript
  S3_SECRET_ACCESS_KEY: liberscript
  APP_URL: http://localhost:3000

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: liberscript
          POSTGRES_PASSWORD: liberscript
          POSTGRES_DB: liberscript
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U liberscript"
          --health-interval 5s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      # Apply every migration to the ephemeral CI Postgres (proves they run),
      # then confirm the resulting DB matches schema.prisma (no drift).
      - name: Apply migrations to the CI database
        run: pnpm --filter @liberscript/db exec prisma migrate deploy

      - name: Verify schema matches migrations (no drift)
        run: pnpm --filter @liberscript/db exec prisma migrate diff --from-url "$DATABASE_URL" --to-schema-datamodel ./prisma/schema.prisma --exit-code

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
