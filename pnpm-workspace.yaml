packages:
  - "apps/*"
  - "packages/*"

# Dedupe ioredis to a single version so the instance type matches bullmq's.
overrides:
  ioredis: 5.11.0

allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  core-js: false
  es5-ext: false
  esbuild: true
  msgpackr-extract: true
  prisma: true
  # Chromium is provided at runtime (PUPPETEER_EXECUTABLE_PATH) rather than
  # auto-downloaded on install — see docs for the Print-PDF export.
  puppeteer: false
  sharp: true
